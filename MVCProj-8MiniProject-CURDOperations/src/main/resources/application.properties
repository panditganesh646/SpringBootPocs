spring.application.name=MVCProj-8MiniProject-CURDOperations

#InternalResource View Resolver configurations
spring.mvc.view.prefix=/WEB-INF/pages/
spring.mvc.view.suffix=.jsp

#Server port number
server.port=4041

#standalone application context-path
server.servlet.context-path=/Employee-CURD

#Connection provider to work with HikariCP
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/mvcprojects
spring.datasource.username=ganesh
spring.datasource.password=1234
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.idle-timeout=60


# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = DIALECT (Important)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect



